name: Keep Render Alive

on:
  schedule:
    - cron: "*/10 * * * *" # Every 10 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -fsS --max-time 10 https://almigo-ai-mentor-backend.onrender.com/health || echo "Ping failed"
